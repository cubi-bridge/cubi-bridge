name: Build & Release CUBI Bridge

on:
  push:
    tags:
      - 'bridge-v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: cubi recors/CUBI-Bridge-v1.3.0-source
        run: npm install --no-audit --no-fund

      - name: Build NSIS installer + publish to GitHub Releases
        working-directory: cubi recors/CUBI-Bridge-v1.3.0-source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis --publish always
